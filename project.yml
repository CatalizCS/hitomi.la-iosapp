name: HitomiReader

options:
  bundleIdPrefix: com.hitomireader
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  HitomiReader:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - HitomiReader
    settings:
      base:
        PRODUCT_NAME: HitomiReader
        PRODUCT_BUNDLE_IDENTIFIER: com.hitomireader.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: HitomiReader/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - framework: JavaScriptCore.framework
        embed: false
    info:
      path: HitomiReader/Info.plist
