name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild -project HitomiReader.xcodeproj \
            -scheme HitomiReader \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/HitomiReader.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="1.0.${{ github.run_number }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/HitomiReader.xcarchive/Products/Applications/HitomiReader.app build/Payload/
          cd build && zip -r HitomiReader.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HitomiReader-IPA
          path: build/HitomiReader.ipa

      - name: Release Unsigned IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "HitomiReader v1.0.${{ github.run_number }}"
          body: "Automated build of the unsigned IPA. Version: 1.0.${{ github.run_number }} (Build ${{ github.run_number }})"
          files: build/HitomiReader.ipa
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
